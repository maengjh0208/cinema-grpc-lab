// proto3 문법 사용
syntax = "proto3";

// 네임스페이스 (여러 proto 파일이 있을 때 충돌 방지)
package auth;

// gRPC 서비스 이름
service AuthService {
    // 메서드 정의
    rpc ValidateToken (ValidateTokenRequest) returns (ValidateTokenResponse);
}

// 요청/응답 데이터 구조
// = 1, = 2 는 필드 번호 (직렬화할 때 식별자. 이름이 아님!)
message ValidateTokenRequest {
    string token = 1;
}

message ValidateTokenResponse {
    bool is_valid = 1;
    int32 user_id = 2;
}

